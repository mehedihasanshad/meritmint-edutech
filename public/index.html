<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MeritMint — Home</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="nav">
      <div class="logo">
        <!-- Replace both logo.png and logo-mark.png with your attached images -->
        <img src="/assets/logo.png" alt="MeritMint" />
      </div>
      <nav>
        <button id="btn-login">Login / Register</button>
        <button id="btn-dashboard">Dashboard</button>
      </nav>
    </header>

    <main class="hero">
      <div class="glass hero-card">
        <h1>MeritMint</h1>
        <p>Tension Gone. Grades On.</p>
        <div class="courses">
          <div class="course">
            <h3>Course in Depth</h3>
            <p>Comprehensive deep course for long term preparation.</p>
            <button class="buy" data-course="1">Buy (via Transaction ID)</button>
          </div>
          <div class="course">
            <h3>Crash Course</h3>
            <p>Short focused crash course for fast improvement.</p>
            <button class="buy" data-course="2">Buy (via Transaction ID)</button>
          </div>
          <div class="course">
            <h3>Sure Shot (Recorded)</h3>
            <p>Recorded lessons, repeat any time.</p>
            <button class="buy" data-course="3">Buy (via Transaction ID)</button>
          </div>
        </div>
      </div>
    </main>

    <section class="exams">
      <div class="glass container">
        <h2>Running Exam Batches</h2>
        <div id="exams-list">Loading...</div>
      </div>
    </section>

    <div id="modal" class="modal hidden">
      <div class="modal-body glass">
        <button id="modal-close">✕</button>
        <div id="modal-content"></div>
      </div>
    </div>

    <script src="/js/app.js"></script>
  </body>
</html>
